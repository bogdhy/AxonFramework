# University Message Transformation Demo Configuration
#
# Default is in-memory, so the demo (and its tests) build cold without infrastructure.
# Flip to "true" and run `docker compose up -d` in this module's directory to use a
# real Axon Server: events become inspectable in the dashboard at http://localhost:8024.
axon.server.enabled=false

# AxonIQ Platform credentials (optional). Prefer .env (see README) over committing
# secrets here. Real env vars and .env both override these values.
#axoniq.platform.environment-id=
#axoniq.platform.access-token=
#axoniq.platform.application-name=university-message-transformation
